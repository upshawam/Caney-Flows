name: Scrape Dam Generation Schedules

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Scrape schedules
        run: python scripts/scrape_generation.py

      - name: Commit updated schedule
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(data): update generation schedules"
          file_pattern: data/generation_schedule.json
